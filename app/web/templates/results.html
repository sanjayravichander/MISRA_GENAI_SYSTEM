<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>SRM Technologies — Review Results</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>

<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo-lockup" href="/">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z" />
            <path d="M2 17l10 5 10-5" />
            <path d="M2 12l10 5 10-5" />
          </svg>
        </div>
        <div>
          <div class="logo-name">SRM <em>Technologies</em></div>
          <div class="logo-sub">MISRA Compliance Reviewer</div>
        </div>
      </a>

      <div class="header-divider"></div>

      <div class="header-tags">
        <span class="header-tag">MISRA-C 2012</span>
        <span class="header-tag">Results Report</span>
      </div>

    </div>
  </header>

  <main>
    <div class="container mt-32" id="results-root">
      <div class="loading-state">
        <div>
          <div class="ld"></div>
          <div class="ld"></div>
          <div class="ld"></div>
        </div>
        <span class="ld-text">Loading results…</span>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    MISRA Compliance Reviewer
  </footer>

  <script>window.MISRA_RUN_ID = "{{ run_id }}";</script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
